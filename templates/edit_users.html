{% extends "base.html" %}
{% block title %} Edit User {% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <div class="dashboard-grid-container">
        
        <div class="sidebar">
            <h2>Admin Panel</h2>
            <a href="{{ url_for('main.admin_dashboard') }}">Dashboard</a>
            <a href="{{ url_for('main.admin_users') }}" class="active">Kelola Pengguna</a>
            <a href="{{ url_for('main.admin_questions') }}">Kelola Pertanyaan Kuis</a>
            <a href="{{ url_for('main.profile') }}">Kembali ke Profil</a>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>Edit Data Pengguna</h1>
            </div>

            <div class="welcome-box">
                <h3>Ubah Informasi untuk: {{ user.name }}</h3>
                <form action="{{ url_for('main.edit_user', id=user.id) }}" method="POST" style="margin-top: 15px;">
                    
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Nama Lengkap</label>
                        <input type="text" name="name" value="{{ user.name }}" required style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Alamat Email</label>
                        <input type="email" name="email" value="{{ user.email }}" required style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Password Baru <span style="font-weight: normal; color: #6c757d; font-size: 13px;">(Kosongkan jika tidak ingin mengubah password)</span></label>
                        <input type="password" name="password" placeholder="Masukkan password baru" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <label>
                            <input type="checkbox" name="is_admin" {% if user.is_admin %} checked {% endif %}> Berikan Hak Akses Administrator (Admin)
                        </label>
                    </div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button type="submit" style="background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer;">Perbarui Data</button>
                        <a href="{{ url_for('main.admin_users') }}" style="background-color: #6c757d; color: white; text-decoration: none; padding: 10px 15px; border-radius: 4px; text-align: center;">Batal</a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
